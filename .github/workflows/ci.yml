name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Detect Python lane scope
        id: python_scope
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            git fetch --no-tags --prune --depth=200 origin "+refs/heads/${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"
            BASE_REF="origin/${GITHUB_BASE_REF}"
            RANGE_SPEC="$(git merge-base "${BASE_REF}" HEAD)..HEAD"
          else
            BEFORE_SHA="${GITHUB_EVENT_BEFORE}"
            if [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
              RANGE_SPEC="${BEFORE_SHA}..HEAD"
            elif git rev-parse HEAD^ >/dev/null 2>&1; then
              RANGE_SPEC="HEAD^..HEAD"
            else
              RANGE_SPEC="HEAD"
            fi
          fi
          python3 - "${RANGE_SPEC}" <<'PY' >> "$GITHUB_OUTPUT"
          import re
          import subprocess
          import sys

          range_spec = sys.argv[1]
          files = [
              line
              for line in subprocess.check_output(
                  ["git", "diff", "--name-only", "--diff-filter=ACDMRTUXB", range_spec],
                  text=True,
              ).splitlines()
              if line.strip()
          ]

          print("range_spec<<EOF")
          print(range_spec)
          print("EOF")
          print("changed_files<<EOF")
          for path in files:
              print(path)
          print("EOF")

          scope = "full"
          arc = ""
          if files:
              arc_numbers: set[int] = set()
              has_artifacts = False
              start_allowed = True
              closeout_allowed = True
              option_pattern = re.compile(r"docs/DRAFT_NEXT_ARC_OPTIONS_v\d+\.md$")
              arc_doc_patterns = (
                  re.compile(r"docs/LOCKED_CONTINUATION_vNEXT_PLUS(\d+)\.md$"),
                  re.compile(r"docs/DRAFT_STOP_GATE_DECISION_vNEXT_PLUS(\d+)\.md$"),
                  re.compile(r"docs/ASSESSMENT_vNEXT_PLUS(\d+)_EDGES\.md$"),
              )
              closeout_artifact_patterns = (
                  re.compile(r"artifacts/quality_dashboard_v(\d+)_closeout\.json$"),
                  re.compile(r"artifacts/stop_gate/metrics_v(\d+)_closeout\.json$"),
                  re.compile(r"artifacts/stop_gate/report_v(\d+)_closeout\.md$"),
                  re.compile(r"artifacts/agent_harness/v(\d+)/.+$"),
              )

              for path in files:
                  matched = False
                  if option_pattern.fullmatch(path):
                      matched = True
                  else:
                      for pattern in arc_doc_patterns:
                          doc_match = pattern.fullmatch(path)
                          if doc_match is not None:
                              arc_numbers.add(int(doc_match.group(1)))
                              matched = True
                              break
                      if not matched:
                          for pattern in closeout_artifact_patterns:
                              artifact_match = pattern.fullmatch(path)
                              if artifact_match is not None:
                                  arc_numbers.add(int(artifact_match.group(1)))
                                  has_artifacts = True
                                  matched = True
                                  break

                  if not matched:
                      start_allowed = False
                      closeout_allowed = False
                      break

                  if path.startswith("artifacts/"):
                      start_allowed = False

              if len(arc_numbers) == 1:
                  arc = str(next(iter(arc_numbers)))
                  if closeout_allowed and has_artifacts:
                      scope = "arc_closeout"
                  elif start_allowed and not has_artifacts:
                      scope = "arc_start"

          print(f"scope={scope}")
          print(f"arc={arc}")
          PY
      - name: Bootstrap
        run: make bootstrap
      - name: Run arc start bundle checks
        if: steps.python_scope.outputs.scope == 'arc_start'
        run: make arc-start-check ARC=${{ steps.python_scope.outputs.arc }}
      - name: Run arc closeout bundle checks
        if: steps.python_scope.outputs.scope == 'arc_closeout'
        run: make arc-closeout-check ARC=${{ steps.python_scope.outputs.arc }}
      - name: Lint
        if: steps.python_scope.outputs.scope == 'full'
        run: make lint
      - name: Test
        if: steps.python_scope.outputs.scope == 'full'
        run: make test
      - name: Build quality dashboard
        if: steps.python_scope.outputs.scope == 'full'
        run: .venv/bin/python apps/api/scripts/build_quality_dashboard.py --out artifacts/quality_dashboard.json
      - name: Run determinism oracles
        if: steps.python_scope.outputs.scope == 'full'
        run: .venv/bin/python apps/api/scripts/run_determinism_oracles.py --out artifacts/determinism_oracles.json
      - name: Build stop-gate metrics
        if: steps.python_scope.outputs.scope == 'full'
        run: |
          mkdir -p artifacts/stop_gate
          .venv/bin/stop-gate \
            --incident-packet examples/eval/stop_gate/incident_packet_case_a_1.json \
            --incident-packet examples/eval/stop_gate/incident_packet_case_a_2.json \
            --event-stream apps/api/tests/fixtures/urm_events/sample_valid.ndjson \
            --connector-snapshot examples/eval/stop_gate/connector_snapshot_case_a_1.json \
            --connector-snapshot examples/eval/stop_gate/connector_snapshot_case_a_2.json \
            --quality-current artifacts/quality_dashboard.json \
            --out-json artifacts/stop_gate/metrics.json \
            --out-md artifacts/stop_gate/report.md
      - name: Build domain conformance report
        if: steps.python_scope.outputs.scope == 'full'
        run: |
          mkdir -p artifacts/domain_conformance_events
          .venv/bin/python apps/api/scripts/build_domain_conformance.py \
            --out artifacts/domain_conformance.json \
            --events-dir artifacts/domain_conformance_events
      - name: Build URM events diagnostics
        if: steps.python_scope.outputs.scope == 'full'
        run: |
          mkdir -p artifacts/urm_events
          .venv/bin/events validate --in apps/api/tests/fixtures/urm_events/sample_valid.ndjson --strict
          .venv/bin/events replay --in apps/api/tests/fixtures/urm_events/sample_valid.ndjson --out artifacts/urm_events/replay.ndjson
          .venv/bin/events summary --in apps/api/tests/fixtures/urm_events/sample_valid.ndjson --out-json artifacts/urm_events/summary.json --out-md artifacts/urm_events/summary.md
      - name: Verify generated instruction policy docs are up to date
        if: steps.python_scope.outputs.scope == 'full'
        run: .venv/bin/python apps/api/scripts/generate_instruction_policy_views.py --check
      - name: Lint closeout consistency
        if: steps.python_scope.outputs.scope == 'full'
        env:
          TZ: UTC
          LC_ALL: C
          PYTHONHASHSEED: "0"
        run: |
          PYTHONPATH=apps/api/src:packages/urm_runtime/src .venv/bin/python \
            apps/api/scripts/lint_closeout_consistency.py
      - name: Lint semantic compiler closeout wiring
        if: steps.python_scope.outputs.scope == 'full'
        env:
          TZ: UTC
          LC_ALL: C
          PYTHONHASHSEED: "0"
        run: |
          PYTHONPATH=apps/api/src:packages/urm_runtime/src .venv/bin/python \
            apps/api/scripts/lint_semantic_compiler_closeout.py
      - name: Detect v35 boundary lint scope
        if: steps.python_scope.outputs.scope == 'full'
        id: v35_boundary_scope
        env:
          TZ: UTC
          LC_ALL: C
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --prune --depth=200 origin +refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}
            BASE_REF="origin/${{ github.base_ref }}"
          else
            git fetch --no-tags --prune --depth=200 origin +refs/heads/main:refs/remotes/origin/main
            BASE_REF="origin/main"
          fi
          MERGE_BASE="$(git merge-base "${BASE_REF}" HEAD)"
          CHANGED_FILES="$(git diff --name-only --diff-filter=ACDMRTUXB "${MERGE_BASE}..HEAD")"
          if printf '%s\n' "${CHANGED_FILES}" | rg -q '^(docs/LOCKED_CONTINUATION_vNEXT_PLUS35\.md|apps/api/scripts/lint_l2_boundary_readiness\.py|apps/api/tests/test_l2_boundary_readiness_lint\.py|apps/api/tests/fixtures/l2_boundary_sentinels/)'; then
            echo "run_lint=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_lint=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Lint v35 L2 boundary readiness
        if: steps.v35_boundary_scope.outputs.run_lint == 'true'
        env:
          TZ: UTC
          LC_ALL: C
        run: |
          git fetch --no-tags --prune --depth=200 origin +refs/heads/main:refs/remotes/origin/main
          PYTHONPATH=apps/api/src:packages/urm_runtime/src .venv/bin/python \
            apps/api/scripts/lint_l2_boundary_readiness.py \
            --lock-doc docs/LOCKED_CONTINUATION_vNEXT_PLUS35.md \
            --base-ref origin/main \
            --sentinel-dir apps/api/tests/fixtures/l2_boundary_sentinels
      - name: Upload quality dashboard artifact
        if: ${{ steps.python_scope.outputs.scope == 'full' && !cancelled() && hashFiles('artifacts/quality_dashboard.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: quality-dashboard
          path: artifacts/quality_dashboard.json
          if-no-files-found: error
      - name: Upload determinism oracles artifact
        if: ${{ steps.python_scope.outputs.scope == 'full' && !cancelled() && hashFiles('artifacts/determinism_oracles.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: determinism-oracles
          path: artifacts/determinism_oracles.json
          if-no-files-found: error
      - name: Upload stop-gate metrics artifact
        if: ${{ steps.python_scope.outputs.scope == 'full' && !cancelled() && hashFiles('artifacts/stop_gate/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: stop-gate-metrics
          path: artifacts/stop_gate
          if-no-files-found: error
      - name: Upload domain conformance artifact
        if: ${{ steps.python_scope.outputs.scope == 'full' && !cancelled() && hashFiles('artifacts/domain_conformance.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: domain-conformance
          path: artifacts/domain_conformance.json
          if-no-files-found: error
      - name: Upload URM events diagnostics artifact
        if: ${{ steps.python_scope.outputs.scope == 'full' && !cancelled() && hashFiles('artifacts/urm_events/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: urm-events-diagnostics
          path: artifacts/urm_events
          if-no-files-found: error

  lean-formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Bootstrap
        run: make bootstrap
      - name: Install Lean toolchain
        run: |
          set -euo pipefail
          ELAN_VERSION="v4.1.2"
          ELAN_ARCHIVE="elan-x86_64-unknown-linux-gnu.tar.gz"
          attempt=1
          max_attempts=3
          until [ "$attempt" -gt "$max_attempts" ]; do
            rm -rf "$HOME/.elan"
            tmpdir="$(mktemp -d)"
            if curl --retry 5 --retry-delay 2 --retry-all-errors -sSfL \
              "https://github.com/leanprover/elan/releases/download/${ELAN_VERSION}/${ELAN_ARCHIVE}" \
              -o "${tmpdir}/elan.tar.gz" \
              && tar -xzf "${tmpdir}/elan.tar.gz" -C "${tmpdir}" \
              && "${tmpdir}/elan-init" -y --default-toolchain none; then
              rm -rf "${tmpdir}"
              break
            fi
            rm -rf "${tmpdir}"
            if [ "$attempt" -eq "$max_attempts" ]; then
              exit 1
            fi
            sleep $((attempt * 10))
            attempt=$((attempt + 1))
          done
          export PATH="$HOME/.elan/bin:$PATH"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          TOOLCHAIN="$(cat packages/adeu_lean/lean-toolchain)"
          attempt=1
          until [ "$attempt" -gt "$max_attempts" ]; do
            if elan toolchain install "$TOOLCHAIN"; then
              break
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              exit 1
            fi
            sleep $((attempt * 10))
            attempt=$((attempt + 1))
          done
          elan default "$TOOLCHAIN"
          lean --version
          lake --version
      - name: Warm up Lean formal lane
        env:
          TZ: UTC
          LC_ALL: C
        run: |
          set -euo pipefail
          cd packages/adeu_lean
          lake build
      - name: Run real Lean formal-lane checks
        env:
          ADEU_REQUIRE_REAL_LEAN_LANE: "1"
          ADEU_PROOF_BACKEND: "lean"
          ADEU_LEAN_TIMEOUT_MS: "15000"
          TZ: UTC
          LC_ALL: C
        run: |
          .venv/bin/pytest \
            packages/adeu_lean/tests/test_agreement_real_lean.py \
            apps/api/tests/test_formal_lane_real_lean.py

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Generate types
        run: npm run gen:types
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Audit prod deps
        run: npm audit --omit=dev
