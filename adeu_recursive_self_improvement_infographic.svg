<text x="346" y="1018" class="h1">Primary recursive utility</text>
<text x="346" y="1080" class="body">Self-improve by evaluating external advancements, admitting</text>
<text x="346" y="1122" class="body">only what passes the ADEU quality threshold and strengthens</text>
<text x="346" y="1164" class="body">the composite human-machine system.</text>
