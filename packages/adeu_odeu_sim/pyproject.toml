[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "adeu-odeu-sim"
version = "0.0.0"
description = "Repo-owned ADEU ODEU simulation kernel for V51-A."
readme = "../../README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE" }
classifiers = [
  "License :: OSI Approved :: Apache Software License",
]
dependencies = [
  "pydantic>=2.6,<3",
]

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
  "ruff>=0.6,<1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/adeu_odeu_sim"]
