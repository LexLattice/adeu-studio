[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "adeu-repo-description"
version = "0.0.0"
description = "Typed ADEU repo self-description artifacts for V45-A schema-visible cataloging."
readme = "../../README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE" }
classifiers = [
  "License :: OSI Approved :: Apache Software License",
]
dependencies = [
  "pydantic>=2.6,<3",
  "adeu-ir>=0.0.0",
  "urm-runtime>=0.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
  "ruff>=0.6,<1",
  "jsonschema>=4,<5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/adeu_repo_description"]
