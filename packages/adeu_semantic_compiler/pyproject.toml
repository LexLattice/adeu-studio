[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "adeu-semantic-compiler"
version = "0.0.0"
description = "Deterministic semantic compiler core pipeline for ASC V32-C."
readme = "../../README.md"
requires-python = ">=3.11"
dependencies = [
  "adeu-commitments-ir>=0.0.0",
  "adeu-ir>=0.0.0",
  "urm-runtime>=0.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
  "ruff>=0.6,<1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/adeu_semantic_compiler"]
