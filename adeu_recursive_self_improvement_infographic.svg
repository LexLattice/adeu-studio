<text x="306" y="548" class="h1">Constitutional principle</text>
<text x="306" y="612" class="body">ADEU may improve only through explicit self-amendment that</text>
<text x="306" y="654" class="body">preserves system coherence, keeps the human structurally</text>
<text x="306" y="696" class="body">internal, and makes integration legible in O / E / D / U</text>
<text x="306" y="738" class="body">terms.</text>
