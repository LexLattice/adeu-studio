[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "adeu-arc-solver"
version = "0.0.0"
description = "Bounded ARC observation/hypothesis derivation helpers for V42-B."
readme = "../../README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE" }
classifiers = [
  "License :: OSI Approved :: Apache Software License",
]
dependencies = [
  "adeu-arc-agi>=0.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
  "ruff>=0.6,<1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/adeu_arc_solver"]
