[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "adeu-semantic-source"
version = "0.0.0"
description = "Deterministic semantic-source parser/normalizer for ASC V32-B."
readme = "../../README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE" }
classifiers = [
  "License :: OSI Approved :: Apache Software License",
]
dependencies = [
  "adeu-ir>=0.0.0",
  "urm-runtime>=0.0.0",
  "PyYAML>=6,<7",
]

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
  "ruff>=0.6,<1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/adeu_semantic_source"]
